<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>Dissection Laboratory Activity</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
          font-family: 'Quicksand', sans-serif;
            background-image: url('Background.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            zoom: 67%;
        }

        .progress-bar-container {
            width: 80%;
            max-width: 800px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-top: 10px;
            height: 50px;
            overflow: hidden;
            border: 2px solid #4caf50; /* Green outline */
        }

        .progress-bar {
            width: 0%; /* Start at 0% */
            height: 100%;
            background-color: #4caf50; /* Green color */
            text-align: center;
            line-height: 20px;
            color: white;
            font-weight: bold;
            transition: width 0.5s; /* Smooth progress bar animation */
        }

        .top-image {
            margin-top: 20px;
            width: 80%;
            max-width: 800px;
            height: auto;
        }

        .drag-image {
            width: 150px;
            cursor: pointer;
            position: absolute;
            bottom: 15%;
            left: 80%;
            transform: translateX(-50%);
        }

        .drop-zone {
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #dropzcontainer {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <!-- Clickable Image -->
    <img id="clickableImage" src="Sequence Images/Sequence 1.png" alt="Clickable Image" class="top-image">

    <!-- Draggable Image Container -->
    <div id="container">
        <div id="card">
            <img id="dragImage" src="Frog.png" alt="Clickable Image" class="drag-image" draggable="true">
        </div>
    </div>

    <!-- Drop Zone -->
    <div id="dropzcontainer">
        <div class="drop-zone" id="dropZone">
            Drop Here
        </div>
    </div>

    <script>
        const image = document.getElementById('clickableImage');
        const progressBar = document.getElementById('progressBar');
        const images = ['Sequence Images/Sequence 1.png', 'Sequence Images/Sequence 2.png', 'Sequence Images/Sequence 3.png'];
        let currentIndex = 0;
        let clickCount = 0;

        image.addEventListener('click', () => {
            if (clickCount < 2) { // Max of 2 clicks for three images
                currentIndex = (currentIndex + 1) % images.length;
                image.src = images[currentIndex];
                clickCount++;

                // Update progress bar
                const progress = (clickCount / 2) * 25; // Calculate progress percentage
                progressBar.style.width = `${progress}%`;
                progressBar.textContent = `${Math.round(progress)}%`;
            }
        });

        const draggableImage = document.getElementById('dragImage');
        const dropZone = document.getElementById('dropZone');

        // Allow the drop zone to accept the image
        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
        });

        // Handle drop event and navigate to the next page
        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            window.location.href = 'FrogLab2.html'; // Navigate to the next page
        });

        // Make the image draggable
        draggableImage.addEventListener('dragstart', (event) => {
            event.dataTransfer.setData('text/plain', draggableImage.id);
        });

        document.addEventListener('DOMContentLoaded', function () {
            // Ensure full zoom
            document.body.style.zoom = '1';

            // Workaround for browsers that ignore 'zoom'
            if (window.devicePixelRatio !== 1) {
                const scale = 1 / window.devicePixelRatio;
                const metaTag = document.createElement('meta');
                metaTag.name = 'viewport';
                metaTag.content = `width=device-width, initial-scale=${scale}, maximum-scale=${scale}, user-scalable=no`;
                document.head.appendChild(metaTag);
            }
        });
    </script>
</body>
</html>
