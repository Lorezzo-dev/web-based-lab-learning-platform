<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>Dissection Laboratory Activity</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
           font-family: 'Quicksand', sans-serif;
            background-image: url('FDPage.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .top-image {
          margin-top: 20px;
          width: 80%; /* Adjust percentage for desired size */
          max-width: 800px; /* Optional: limit maximum size */
          height: auto; /* Maintain aspect ratio */
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .frogbody {
            width: 700px;
            height: auto;
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .scalpel {
            width: 50px;
            position: absolute;
            top: 250px;
            right:  300px;
            z-index: 10;
            cursor: grab;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .organ {
            position: absolute;
            z-index: 3;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Adjust each organ's positioning to use viewport-relative units */
        .intestine { width: 225px; top: 49.5vh; left: 49vw; transform: translate(-50%, -50%); }
        .heartarteries { width: 400px; top: 53vh; left: 50.5vw; transform: translate(-50%, -50%); }
        .kidney { width: 150px; top: 45vh; left: 50vw; transform: translate(-50%, -50%); }
        .lungs { width: 180px; top: 42vh; left: 50vw; transform: translate(-50%, -50%); }
        .fats { width: 180px; top: 45vh; left: 50vw; transform: translate(-50%, -50%); }
        .galbladder { width: 45px; top: 45vh; left: 47vw; transform: translate(-50%, -50%); }
        .liver { width: 200px; top: 42vh; left: 50vw; transform: translate(-50%, -50%); }

        .bottom-right-image {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1000px;
            height: auto;
            z-index: 5;
            transition: transform 0.3s ease;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: scale(1); }
            40% { transform: scale(1.1); }
            60% { transform: scale(1.3); }
        }

        .organ:hover ~ .bottom-right-image {
            animation: bounce 0.5s;
        }

        .completion-popup {
            display: none;
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border: 3px solid #00796b;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease;
            z-index: 100;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .submit-button {
            padding: 10px 20px;
            background: #00796b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.5em;
            transition: background 0.3s ease;

        }

        .submit-button:hover {
            background: #004d40;
        }

        .submit-button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px; /* Optional: adjust spacing from other elements */
        }

        .progress-bar-container {
            width: 80%;
            max-width: 800px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin: 10px auto; /* Center the bar */
            height: 20px;
            overflow: hidden;
            border: 2px solid #4caf50; /* Green outline */
            position: fixed; /* Fix the progress bar at the top */
            z-index: 1000; /* Ensure it appears above other elements */
            top: 0;
        }

        .progress-bar {
            width: 0%; /* Start at 0% */
            height: 100%;
            background-color: #4caf50; /* Green color */
            text-align: center;
            line-height: 20px;
            color: white;
            font-weight: bold;
            transition: width 0.5s; /* Smooth animation */
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img id="clickableImage" src="FD Sequence Images/Sequence 2.png" alt="Clickable Image" class="top-image">
        <img src="Frog2.png" alt="Frog for Dissection" class="frogbody" id="frog">
        <img src="intestine.png" alt="Frog's intestine" class="intestine organ" id="intestine">
        <img src="Frog Arteries.png" alt="Heart Arteries" class="heartarteries organ" id="heartarteries">
        <img src="Kidney.png" alt="Frog's kidney" class="kidney organ" id="kidney">
        <img src="Lungs.png" alt="Lungs" class="lungs organ" id="lungs">
        <img src="fats.png" alt="Fats" class="fats organ" id="fats">
        <img src="Gal Bladder.png" alt="Gallbladder" class ="galbladder organ" id="galbladder">
        <img src="Liver.png" alt="Liver" class="liver organ" id="liver">
        <img src="container.png" alt="Bottom Right Image" class="bottom-right-image" id="container">
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="completion-popup" id="completionPopup">
        <p>All organs have been successfully placed on the container.</p>
        <div class="submit-button-container">
        <button class="submit-button" onclick="proceed()">Proceed</button>
      </div>
    </div>

    <script>
        document.body.style.cursor = 'url("mouse cursor 62.png"), auto';

        let droppedCount = 0; // Counter for dropped organs
        const totalOrgans = document.querySelectorAll('.organ').length;

        function makeDraggable(element) {
            element.style.position = 'absolute';
            element.addEventListener('mousedown', (e) => {
                const rect = element.getBoundingClientRect();
                const offsetX = e.clientX - rect.left - rect.width / 2;
                const offsetY = e.clientY - rect.top - rect.height / 2;

                const onMouseMove = (event) => {
                    element.style.left = `${event.clientX - offsetX}px`;
                    element.style.top = `${event.clientY - offsetY}px`;
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    checkDrop(element);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        function checkDrop(element) {
            const container = document.getElementById('container');
            const containerRect = container.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();

            // Check if the element is within the bounds of the container
            if (
                elementRect.left < containerRect.right &&
                elementRect.right > containerRect.left &&
                elementRect.top < containerRect.bottom &&
                elementRect.bottom > containerRect.top
            ) {
                element.style.display = 'none'; // Hide the organ
                droppedCount++; // Increment the dropped count
                checkAllDropped(); // Check if all organs are dropped
            }
        }

        function checkAllDropped() {
            if (droppedCount === totalOrgans) {
                const popup = document.getElementById('completionPopup');
                popup.style.display = 'block';
            }
        }

        function proceed() {
            // Redirect to the next page
            window.location.href = 'PartsAssessment.html';
        }

        // Make the specified elements draggable
        const organs = document.querySelectorAll('.organ');
        organs.forEach(organ => makeDraggable(organ));

        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progressBar');
            const progress = 75; // Set progress to 50%

            // Update progress bar
            progressBar.style.width = `${progress}%`;
            progressBar.textContent = `${progress}%`;
        });

        window.addEventListener('load', () => {
            const progressBar = document.getElementById('progressBar');
            // Set progress to 75% after a delay to trigger animation
            setTimeout(() => {
                progressBar.style.width = '75%';
            }, 100); // Delay for smoother animation on page load
        });
    </script>
</body>
</html>
